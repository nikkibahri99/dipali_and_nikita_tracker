/* ============== state ============== */
const cache={};                 // docId -> {fields}
const timers={};
let current="nikita", activeCat="All";
let WHO = localStorage.getItem("tracker-who") || "Nikita";

const STAGES=["Not Applied","Researching","Applied","Interviewing","Offer","Rejected","Parked"];
const PRIOS=["High","Med-High","Medium","Low"];
const SPON={known:["Known sponsor","#2f7a4a"],likely:["Likely sponsor","#7a6a2e"],check:["Check register","#9a4a4a"]};
const FIELDS=["stage","contacts","last","next","prio_user","notes"];
function slug(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function ago(ts){if(!ts)return"";const s=Math.floor((Date.now()-ts)/1000);if(s<60)return"just now";const m=Math.floor(s/60);if(m<60)return m+"m ago";const h=Math.floor(m/60);if(h<24)return h+"h ago";return Math.floor(h/24)+"d ago";}

/* ============== firestore wiring ============== */
function setSync(ok,txt){const el=document.getElementById("sync");el.className="sync "+(ok?"ok":"off");document.getElementById("syncTxt").textContent=txt;}
if(db){
  try{
    onSnapshot(collection(db,COL),snap=>{
      snap.forEach(d=>{cache[d.id]=d.data();});
      setSync(true,"live · synced");
      patchLive();
    },err=>{ setSync(false,"offline (check rules)"); });
  }catch(e){ setSync(false,"offline"); }
}else{ setSync(false,"offline (local only)"); }

function writeField(s,field,val,debounce){
  const docId=current+"__"+s;
  cache[docId]={...(cache[docId]||{}),[field]:val,updatedBy:WHO,updatedAt:Date.now()};
  stamp(s);
  const go=()=>{ if(db){ setDoc(doc(db,COL,docId),cache[docId],{merge:true}).catch(()=>setSync(false,"write failed")); } };
  if(debounce){ clearTimeout(timers[docId+field]); timers[docId+field]=setTimeout(go,600); } else go();
}
function stamp(s){
  const el=document.getElementById("ed-"+s);if(!el)return;
  const d=cache[current+"__"+s];
  el.textContent = (d&&d.updatedBy)?`last edit by ${d.updatedBy} · ${ago(d.updatedAt)}`:"";
}
function patchLive(){
  const P=PEOPLE[current];
  P.roles.forEach(r=>{
    const s=slug(r.co), d=cache[current+"__"+s]; if(!d) return;
    const map={stage:"st-",contacts:"ct-",last:"la-",next:"nx-",prio_user:"pu-",notes:"no-"};
    Object.keys(map).forEach(f=>{
      const el=document.getElementById(map[f]+s);
      if(el && document.activeElement!==el && d[f]!=null && el.value!==d[f]) el.value=d[f];
    });
    stamp(s);
  });
}

/* ============== UI ============== */
function tabs(){
  const t=document.getElementById("tabs");t.innerHTML="";
  Object.keys(PEOPLE).forEach(p=>{
    const b=document.createElement("button");b.className="tab";b.dataset.active=(p===current);
    b.innerHTML=`${PEOPLE[p].name} <span class="count">· ${PEOPLE[p].roles.length}</span>`;
    b.onclick=()=>{current=p;activeCat="All";render();};t.appendChild(b);
  });
}
function filters(){
  const f=document.getElementById("filters");f.innerHTML="";
  ["All",...PEOPLE[current].cats].forEach(c=>{
    const b=document.createElement("button");b.className="fchip";b.dataset.on=(c===activeCat);
    const n=c==="All"?PEOPLE[current].roles.length:PEOPLE[current].roles.filter(r=>r.cat===c).length;
    b.textContent=`${c} (${n})`;b.onclick=()=>{activeCat=c;render();};f.appendChild(b);
  });
}
function links(person,r){
  const q=encodeURIComponent(`${r.co} ${r.role} ${r.loc} careers`);
  const li=encodeURIComponent(`${r.role} ${r.loc}`);
  const net=person==="nikita"
    ?{label:"Bath alumni",url:`https://www.linkedin.com/search/results/people/?keywords=${encodeURIComponent(r.co+" University of Bath")}`}
    :{label:"York alumni",url:`https://www.linkedin.com/search/results/people/?keywords=${encodeURIComponent(r.co+" University of York LLM")}`};
  return{careers:`https://www.google.com/search?q=${q}`,network:net,linkedin:`https://www.linkedin.com/jobs/search/?keywords=${li}`,google:`https://www.google.com/search?q=${encodeURIComponent(r.co+" "+r.role)}`};
}

function render(){
  tabs();filters();
  const P=PEOPLE[current];
  document.getElementById("lede").innerHTML=`<div class="strip" style="background:${P.accent}"></div>${P.lede}`;
  const root=document.getElementById("cards");root.innerHTML="";
  const groups=activeCat==="All"?P.cats:[activeCat];
  for(const cat of groups){
    const rolesIn=P.roles.filter(r=>r.cat===cat); if(!rolesIn.length) continue;
    const gh=document.createElement("div");gh.className="grouphead";gh.textContent=cat;root.appendChild(gh);
    for(const r of rolesIn){
      const s=slug(r.co), d=cache[current+"__"+s]||{}, L=links(current,r), sp=SPON[r.sponsor];
      const stage=d.stage||"Not Applied", contacts=d.contacts||"", last=d.last||"", next=d.next||"", prioU=d.prio_user||r.prio, notes=d.notes||"";
      const card=document.createElement("div");card.className="card";
      card.innerHTML=`
        <div class="chead">
          <div><div class="co" style="border-bottom:3px solid ${P.accent}">${r.co}</div>
            <div class="meta">${r.loc} · <span class="role">${r.role}</span> · ${r.sal}</div></div>
          <div class="stagewrap"><label>Stage</label>
            <select id="st-${s}">${STAGES.map(x=>`<option ${x===stage?"selected":""}>${x}</option>`).join("")}</select>
            <div class="fit"><span class="lab">Fit</span><span class="pct" style="color:${P.accent}">${r.fit}%</span>
              <div class="track"><i style="width:${r.fit}%;background:${P.accent}"></i></div></div></div>
        </div>
        <div class="tags">
          <span class="pill hi">${r.prio} priority</span>
          <span class="pill" style="color:${sp[1]};border-color:${sp[1]}33;background:${sp[1]}12">${sp[0]}</span>
          <span class="pill cat">${r.cat}</span>
          ${r.tags.map(t=>`<span class="pill">${t}</span>`).join("")}
        </div>
        <div class="box pitch"><h4>Your pitch — lead with this</h4><p>${r.pitch}</p></div>
        <div class="box brk"><h4>How to break in</h4><p>${r.brk}</p></div>
        <div class="two">
          <div class="box tip"><h4>${current==="nikita"?"Network tip":"SQE / network tip"}</h4><p>${r.tip}</p></div>
          <div class="box tip"><h4>Interview prep</h4><p>${r.prep}</p></div>
        </div>
        <div class="grid2">
          <div class="field"><label>Key contacts</label><input id="ct-${s}" placeholder="Names, LinkedIn, recruiter emails…" value="${esc(contacts)}"></div>
          <div class="field"><label>Last action</label><input id="la-${s}" placeholder="e.g. Applied 12 May 2026…" value="${esc(last)}"></div>
          <div class="field"><label>Next action</label><input id="nx-${s}" placeholder="e.g. Follow up in 1 week…" value="${esc(next)}"></div>
          <div class="field"><label>Priority</label><select id="pu-${s}">${PRIOS.map(p=>`<option ${p===prioU?"selected":""}>${p}</option>`).join("")}</select></div>
          <div class="field full"><label>Notes</label><textarea id="no-${s}" placeholder="Salary info, culture, contacts met…">${esc(notes)}</textarea></div>
        </div>
        <div class="edited" id="ed-${s}"></div>
        <div class="links">
          <a class="primary" href="${L.careers}" target="_blank" rel="noopener">Open careers →</a>
          <a href="${L.network.url}" target="_blank" rel="noopener">${L.network.label}</a>
          <a href="${L.linkedin}" target="_blank" rel="noopener">LinkedIn jobs</a>
          <a href="${L.google}" target="_blank" rel="noopener">Google</a>
        </div>`;
      root.appendChild(card);
      bind("st-"+s,"change",v=>writeField(s,"stage",v,false));
      bind("ct-"+s,"input",v=>writeField(s,"contacts",v,true));
      bind("la-"+s,"input",v=>writeField(s,"last",v,true));
      bind("nx-"+s,"input",v=>writeField(s,"next",v,true));
      bind("pu-"+s,"change",v=>writeField(s,"prio_user",v,false));
      bind("no-"+s,"input",v=>writeField(s,"notes",v,true));
      stamp(s);
    }
  }
}
function bind(id,evt,fn){const el=document.getElementById(id);if(el)el.addEventListener(evt,e=>fn(e.target.value));}

/* who-am-I */
const whoSel=document.getElementById("whoSel");
whoSel.value=WHO;
whoSel.addEventListener("change",e=>{WHO=e.target.value;localStorage.setItem("tracker-who",WHO);});

/* gate */
function startApp(){document.getElementById("appwrap").style.display="block";render();}
if(!PASSPHRASE){ startApp(); }
else if(sessionStorage.getItem("tracker-unlocked")==="1"){ startApp(); }
else{
  const g=document.getElementById("gate");g.style.display="flex";
  const tryUnlock=()=>{
    const v=document.getElementById("gatepass").value;
    if(v===PASSPHRASE){ sessionStorage.setItem("tracker-unlocked","1"); g.style.display="none"; startApp(); }
    else document.getElementById("gateerr").textContent="Incorrect passphrase";
  };
  document.getElementById("gatebtn").addEventListener("click",tryUnlock);
  document.getElementById("gatepass").addEventListener("keydown",e=>{if(e.key==="Enter")tryUnlock();});
}
</script>
</body>
</html>
